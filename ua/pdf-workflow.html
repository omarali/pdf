      .wf-node {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 280px;
      }

      .wf-card {
        background: #1f2937;
        border: 2px solid var(--cat-color, #6b7280);
        border-radius: 12px;
        width: 100%;
        overflow: hidden;
        transition: box-shadow 0.2s;
      }

      .wf-selected .wf-card {
        box-shadow: 0 0 0 3px
          color-mix(in srgb, var(--cat-color) 40%, transparent);
      }

      .wf-header {
        padding: 8px 14px 4px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .wf-cat {
        font-size: 11px;
        font-weight: 600;
        color: var(--cat-color, #9ca3af);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .wf-divider {
        height: 1px;
        background: #374151;
        margin: 0 14px;
      }

      .wf-body {
        padding: 10px 14px 12px;
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }

      .wf-icon {
        width: 18px;
        height: 18px;
        color: var(--cat-color, #9ca3af);
        flex-shrink: 0;
        margin-top: 1px;
      }

      .wf-info {
        flex: 1;
        min-width: 0;
      }

      .wf-title {
        font-size: 13px;
        font-weight: 600;
        color: #f3f4f6;
        line-height: 1.3;
      }

      .wf-desc {
        font-size: 11px;
        color: #9ca3af;
        margin-top: 2px;
        line-height: 1.3;
      }

      .wf-tag {
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 4px;
        background: color-mix(in srgb, var(--cat-color) 15%, transparent);
        color: var(--cat-color, #9ca3af);
        font-weight: 500;
        white-space: nowrap;
        flex-shrink: 0;
        align-self: center;
      }

      .wf-sockets {
        display: flex;
        justify-content: center;
        gap: 8px;
        position: relative;
        z-index: 1;
      }

      .wf-sockets-top {
        margin-bottom: -7px;
      }

      .wf-sockets-bottom {
        margin-top: -7px;
      }

      .wf-socket-slot {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .wf-socket {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--socket-color, #6366f1);
        border: 2px solid #1f2937;
        box-shadow: 0 0 0 1px var(--socket-color, #6366f1);
        cursor: crosshair;
        transition: transform 0.15s;
      }

      .wf-socket:hover {
        transform: scale(1.3);
      }

      .connection .main-path {
        stroke: #6366f1;
        stroke-width: 2px;
        fill: none;
      }

      @keyframes wf-bar-slide {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }

      @keyframes wf-dot-pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.4;
          transform: scale(0.75);
        }
      }

      .wf-bar-slide {
        animation: wf-bar-slide 1.5s ease-in-out infinite;
      }

      .wf-dot-pulse {
        animation: wf-dot-pulse 1.2s ease-in-out infinite;
      }
    </style>
